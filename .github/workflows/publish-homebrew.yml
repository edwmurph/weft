name: Publish Homebrew

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Optional semver bump override"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: publish-homebrew
  cancel-in-progress: false

env:
  FORMULA_NAME: weft
  HOMEBREW_TAP_REPOSITORY: edwmurph/homebrew-tap

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine release version
        id: version
        env:
          BASE_SHA: ${{ github.event.before }}
          RELEASE_BUMP: ${{ github.event.inputs.bump || 'auto' }}
        run: |
          set -euo pipefail

          args=(next-version --base "${BASE_SHA:-}" --head HEAD --write --github-output "$GITHUB_OUTPUT")
          if [[ "$RELEASE_BUMP" != "auto" ]]; then
            args+=(--bump "$RELEASE_BUMP")
          fi

          go run ./cmd/weft-release "${args[@]}"

      - name: Generate release notes
        env:
          BASE_SHA: ${{ steps.version.outputs.base }}
        run: |
          go run ./cmd/weft-release release-notes \
            --base "$BASE_SHA" \
            --head HEAD \
            --output dist/release-notes.md

      - name: Verify release tree
        run: |
          go test ./...
          go build -ldflags "-X github.com/edwmurph/weft/internal/version.BuildChannel=release" -o dist/weft ./cmd/weft
          ./dist/weft --help >/dev/null
          ./dist/weft doctor

      - name: Commit release metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch origin main --tags
          if git rev-parse --verify "$TAG" >/dev/null 2>&1; then
            git checkout --force "$TAG"
            exit 0
          fi

          git add VERSION internal/version/version.go
          git commit -m "Release v${VERSION} [skip ci]"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:main --follow-tags

      - name: Prepare source archive metadata
        id: source
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          source_path="dist/weft-${VERSION}.tar.gz"
          curl -L "$source_url" -o "$source_path"
          source_sha256="$(shasum -a 256 "$source_path" | awk '{print $1}')"

          echo "source_url=$source_url" >> "$GITHUB_OUTPUT"
          echo "source_sha256=$source_sha256" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES: dist/release-notes.md
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$RELEASE_NOTES"
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              --notes-file "$RELEASE_NOTES"
          fi

      - name: Checkout Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with write access to ${HOMEBREW_TAP_REPOSITORY}."
            exit 1
          fi

          tap_dir="${RUNNER_TEMP}/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$tap_dir"
          echo "HOMEBREW_TAP_DIR=$tap_dir" >> "$GITHUB_ENV"

      - name: Render Homebrew formula
        env:
          SOURCE_URL: ${{ steps.source.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.source.outputs.source_sha256 }}
        run: |
          go run ./cmd/weft-release render-formula \
            --formula-name "$FORMULA_NAME" \
            --url "$SOURCE_URL" \
            --sha256 "$SOURCE_SHA256" \
            --output "$HOMEBREW_TAP_DIR/Formula/${FORMULA_NAME}.rb"

      - name: Push Homebrew tap update
        run: |
          set -euo pipefail

          cd "$HOMEBREW_TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tap_branch="$(git branch --show-current)"
          if [[ -z "$tap_branch" ]]; then
            tap_branch="main"
            git checkout --orphan "$tap_branch"
          fi

          git add "Formula/${FORMULA_NAME}.rb"
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git commit -m "Update ${FORMULA_NAME} to v${{ steps.version.outputs.version }}"
          git push origin "HEAD:${tap_branch}"
