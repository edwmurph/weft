name: Publish Homebrew

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Optional semver bump override"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      allow_stable_major:
        description: "Allow a manual major bump from 0.x to 1.0.0"
        required: false
        default: false
        type: boolean
      tap_publish_mode:
        description: "Homebrew tap bottle publish mode"
        required: false
        default: direct
        type: choice
        options:
          - direct
          - pr

permissions:
  contents: write

concurrency:
  group: publish-homebrew
  cancel-in-progress: false

env:
  FORMULA_NAME: weft
  HOMEBREW_TAP_DIRECT_WORKFLOW: publish-weft-direct.yml
  HOMEBREW_TAP_PUBLISH_MODE: ${{ github.event.inputs.tap_publish_mode || 'direct' }}
  HOMEBREW_TAP_REPOSITORY: edwmurph/homebrew-tap
  HOMEBREW_TAP_PULL_LABEL: pr-pull

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine release version
        id: version
        env:
          BASE_SHA: ${{ github.event.before }}
          RELEASE_BUMP: ${{ github.event.inputs.bump || 'auto' }}
          ALLOW_STABLE_MAJOR: ${{ github.event.inputs.allow_stable_major || 'false' }}
        run: |
          set -euo pipefail

          args=(next-version --base "${BASE_SHA:-}" --head HEAD --write --github-output "$GITHUB_OUTPUT")
          if [[ "$RELEASE_BUMP" != "auto" ]]; then
            args+=(--bump "$RELEASE_BUMP")
          fi
          if [[ "$ALLOW_STABLE_MAJOR" == "true" ]]; then
            args+=(--allow-stable-major)
          fi

          go run ./cmd/weft-release "${args[@]}"

      - name: Generate release notes
        env:
          BASE_SHA: ${{ steps.version.outputs.base }}
        run: |
          go run ./cmd/weft-release release-notes \
            --base "$BASE_SHA" \
            --head HEAD \
            --output dist/release-notes.md

      - name: Verify release tree
        run: |
          go test ./...
          go build -ldflags "-X github.com/edwmurph/weft/internal/version.BuildChannel=release" -o dist/weft ./cmd/weft
          ./dist/weft --help >/dev/null
          ./dist/weft doctor

      - name: Commit release metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch origin main --tags
          if git rev-parse --verify "$TAG" >/dev/null 2>&1; then
            git checkout --force "$TAG"
            exit 0
          fi

          git add VERSION internal/version/version.go
          git commit -m "Release v${VERSION}"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:main --follow-tags

      - name: Prepare source archive metadata
        id: source
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          source_path="dist/weft-${VERSION}.tar.gz"
          curl -L "$source_url" -o "$source_path"
          source_sha256="$(shasum -a 256 "$source_path" | awk '{print $1}')"

          echo "source_url=$source_url" >> "$GITHUB_OUTPUT"
          echo "source_sha256=$source_sha256" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES: dist/release-notes.md
        run: |
          set -euo pipefail

          release_args=(--notes-file "$RELEASE_NOTES")
          if [[ "$TAG" == v0.* ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" "${release_args[@]}"
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              "${release_args[@]}"
          fi

      - name: Checkout Homebrew tap
        id: tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with write access to ${HOMEBREW_TAP_REPOSITORY}."
            exit 1
          fi

          tap_dir="${RUNNER_TEMP}/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$tap_dir"
          cd "$tap_dir"
          git fetch origin main
          tap_branch="${FORMULA_NAME}-v${VERSION}"

          if [[ -f "Formula/${FORMULA_NAME}.rb" ]] &&
             grep -q "refs/tags/${TAG}.tar.gz" "Formula/${FORMULA_NAME}.rb" &&
             grep -q "bottle do" "Formula/${FORMULA_NAME}.rb"; then
            echo "Homebrew formula is already bottled for ${TAG}."
            echo "already_bottled=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_bottled=false" >> "$GITHUB_OUTPUT"
          fi

          git checkout -B "$tap_branch" origin/main
          echo "HOMEBREW_TAP_DIR=$tap_dir" >> "$GITHUB_ENV"
          echo "HOMEBREW_TAP_BRANCH=$tap_branch" >> "$GITHUB_ENV"

      - name: Render Homebrew formula
        if: steps.tap.outputs.already_bottled != 'true'
        env:
          BASE_SHA: ${{ steps.version.outputs.base }}
          SOURCE_URL: ${{ steps.source.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.source.outputs.source_sha256 }}
        run: |
          go run ./cmd/weft-release render-formula \
            --formula-name "$FORMULA_NAME" \
            --url "$SOURCE_URL" \
            --sha256 "$SOURCE_SHA256" \
            --breaking-base "$BASE_SHA" \
            --breaking-head HEAD \
            --output "$HOMEBREW_TAP_DIR/Formula/${FORMULA_NAME}.rb"

      - name: Create Homebrew tap pull request
        if: steps.tap.outputs.already_bottled != 'true' && env.HOMEBREW_TAP_PUBLISH_MODE == 'pr'
        id: tap_pr
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          cd "$HOMEBREW_TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "Formula/${FORMULA_NAME}.rb"
          if git diff --cached --quiet; then
            pr_number="$(gh pr list \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --head "$HOMEBREW_TAP_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // ""')"
            if [[ -z "$pr_number" ]]; then
              echo "Homebrew formula already up to date."
              echo "pr_number=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update ${FORMULA_NAME} to v${VERSION}"
          git push --force-with-lease origin "HEAD:${HOMEBREW_TAP_BRANCH}"

          pr_number="$(gh pr list \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --head "$HOMEBREW_TAP_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // ""')"
          if [[ -z "$pr_number" ]]; then
            pr_url="$(gh pr create \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --head "$HOMEBREW_TAP_BRANCH" \
              --base main \
              --title "Update ${FORMULA_NAME} to v${VERSION}" \
              --body "Updates ${FORMULA_NAME} to ${TAG}. The tap bottle workflow will build bottles, publish them to GitHub Releases, and update the formula bottle block.")"
            pr_number="$(gh pr view "$pr_url" \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --json number \
              --jq .number)"
          else
            gh pr edit "$pr_number" \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --title "Update ${FORMULA_NAME} to v${VERSION}" \
              --body "Updates ${FORMULA_NAME} to ${TAG}. The tap bottle workflow will build bottles, publish them to GitHub Releases, and update the formula bottle block."
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Wait for Homebrew bottle build
        if: steps.tap.outputs.already_bottled != 'true' && env.HOMEBREW_TAP_PUBLISH_MODE == 'pr' && steps.tap_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PR_NUMBER: ${{ steps.tap_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          for attempt in {1..60}; do
            check_count="$(gh pr checks "$PR_NUMBER" \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --json name \
              --jq 'length' 2>/dev/null || true)"
            if [[ "${check_count:-0}" -gt 0 ]]; then
              break
            fi
            if [[ "$attempt" -eq 60 ]]; then
              echo "::error::Timed out waiting for Homebrew tap checks to start."
              exit 1
            fi
            sleep 10
          done

          gh pr checks "$PR_NUMBER" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --watch \
            --fail-fast \
            --interval 30

      - name: Publish Homebrew bottles through pull request
        if: steps.tap.outputs.already_bottled != 'true' && env.HOMEBREW_TAP_PUBLISH_MODE == 'pr' && steps.tap_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PR_NUMBER: ${{ steps.tap_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh label create "$HOMEBREW_TAP_PULL_LABEL" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --description "Pull bottles and merge formula updates" \
            --color 0e8a16 \
            --force
          gh issue edit "$PR_NUMBER" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --add-label "$HOMEBREW_TAP_PULL_LABEL"

          run_id=""
          for attempt in {1..60}; do
            run_id="$(gh run list \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --workflow publish.yml \
              --event pull_request_target \
              --limit 20 \
              --json databaseId,createdAt \
              --jq 'map(select(.createdAt >= "'"$started_at"'")) | sort_by(.createdAt) | reverse | .[0].databaseId // ""')"
            if [[ -n "$run_id" ]]; then
              break
            fi
            if [[ "$attempt" -eq 60 ]]; then
              echo "::error::Timed out waiting for Homebrew bottle publish workflow to start."
              exit 1
            fi
            sleep 10
          done

          gh run watch "$run_id" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --exit-status

      - name: Publish Homebrew bottles directly
        if: steps.tap.outputs.already_bottled != 'true' && env.HOMEBREW_TAP_PUBLISH_MODE == 'direct'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          cd "$HOMEBREW_TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "Formula/${FORMULA_NAME}.rb"
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date before direct bottle publish."
          else
            git commit -m "Update ${FORMULA_NAME} to v${VERSION}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run "$HOMEBREW_TAP_DIRECT_WORKFLOW" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --ref main \
            -f formula="$FORMULA_NAME" \
            -f version="$VERSION"

          run_id=""
          for attempt in {1..60}; do
            run_id="$(gh run list \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --workflow "$HOMEBREW_TAP_DIRECT_WORKFLOW" \
              --event workflow_dispatch \
              --branch main \
              --limit 20 \
              --json databaseId,createdAt \
              --jq 'map(select(.createdAt >= "'"$started_at"'")) | sort_by(.createdAt) | reverse | .[0].databaseId // ""')"
            if [[ -n "$run_id" ]]; then
              break
            fi
            if [[ "$attempt" -eq 60 ]]; then
              echo "::error::Timed out waiting for direct Homebrew bottle workflow to start."
              exit 1
            fi
            sleep 10
          done

          gh run watch "$run_id" \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --exit-status

      - name: Verify Homebrew bottle block
        if: steps.tap.outputs.already_bottled != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          cd "$HOMEBREW_TAP_DIR"
          git fetch origin main --tags
          git checkout --force main
          git reset --hard origin/main
          grep -q "refs/tags/${TAG}.tar.gz" "Formula/${FORMULA_NAME}.rb"
          grep -q "bottle do" "Formula/${FORMULA_NAME}.rb"
