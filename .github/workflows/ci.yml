name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change scope
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.scope.outputs.full }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide CI scope
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          full() {
            echo "full=true" >> "$GITHUB_OUTPUT"
            echo "reason=$1" >> "$GITHUB_OUTPUT"
          }

          minimal() {
            echo "full=false" >> "$GITHUB_OUTPUT"
            echo "reason=$1" >> "$GITHUB_OUTPUT"
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            full "manual dispatch"
            exit 0
          fi

          if [[ -z "${BASE_SHA:-}" || "$BASE_SHA" =~ ^0+$ ]]; then
            full "no usable base commit"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "$BASE_SHA" >/dev/null 2>&1 || true

          if ! git cat-file -e "$BASE_SHA^{commit}" || ! git cat-file -e "$HEAD_SHA^{commit}"; then
            full "could not resolve comparison commits"
            exit 0
          fi

          mapfile -t changed < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA")
          if [[ "${#changed[@]}" -eq 0 ]]; then
            minimal "no changed source files"
            exit 0
          fi

          for path in "${changed[@]}"; do
            case "$path" in
              .github/workflows/*|cmd/*|hooks/*|internal/*|scripts/*|tests/*|go.mod|go.sum|spec.md)
                full "$path changed"
                exit 0
                ;;
            esac
          done

          minimal "docs or process-only changes"

  release-commit-convention:
    name: Release commit convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR commit subjects
        run: bash scripts/check-pr-commit-subjects.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  test:
    name: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l cmd internal tests)"
          if [[ -n "$unformatted" ]]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Run live integration tests
        run: WEFT_RUN_INTEGRATION=1 go test ./...

      - name: Build
        run: go build ./cmd/weft

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - release-commit-convention
      - test
    if: always()
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail

          release_result="${{ needs.release-commit-convention.result }}"
          changes_result="${{ needs.changes.result }}"
          test_result="${{ needs.test.result }}"
          full="${{ needs.changes.outputs.full }}"
          reason="${{ needs.changes.outputs.reason }}"

          if [[ "$changes_result" != "success" ]]; then
            echo "Change scope failed: $changes_result"
            exit 1
          fi

          if [[ "$release_result" != "success" && "$release_result" != "skipped" ]]; then
            echo "Release commit convention failed: $release_result"
            exit 1
          fi

          if [[ "$full" == "true" ]]; then
            if [[ "$test_result" != "success" ]]; then
              echo "Full CI was required because: $reason"
              echo "OS test matrix result: $test_result"
              exit 1
            fi
            echo "Full CI passed: $reason"
            exit 0
          fi

          if [[ "$full" != "false" ]]; then
            echo "Change scope did not produce a valid full flag: $full"
            exit 1
          fi

          if [[ "$test_result" != "skipped" ]]; then
            echo "Expected OS test matrix to be skipped for minimal CI, got: $test_result"
            exit 1
          fi

          echo "Minimal CI passed: $reason"
