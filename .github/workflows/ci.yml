name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-commit-convention:
    name: Release commit convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR commit subjects
        run: bash scripts/check-pr-commit-subjects.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l cmd internal tests)"
          if [[ -n "$unformatted" ]]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Run live integration tests
        run: WEFT_RUN_INTEGRATION=1 go test ./...

      - name: Build
        run: go build ./cmd/weft
