<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" role="img" aria-labelledby="title desc">
  <title id="title">Codux logo</title>
  <desc id="desc">A transparent blue outline of a terminal window with three grouped tabs and a focused prompt.</desc>
  <defs>
    <linearGradient id="outline" x1="24" y1="338" x2="936" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8cc8ff"/>
      <stop offset="0.5" stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#75baff"/>
    </linearGradient>
    <linearGradient id="detail" x1="40" y1="340" x2="920" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fa9ff"/>
      <stop offset="1" stop-color="#1f68c7"/>
    </linearGradient>
    <linearGradient id="prompt" x1="136" y1="398" x2="312" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9bd1ff"/>
      <stop offset="1" stop-color="#57a6ff"/>
    </linearGradient>
    <linearGradient id="active-tab" x1="70" y1="92" x2="251" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8cc8ff"/>
      <stop offset="1" stop-color="#4f9cff"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="24.5" y="19.5" width="911" height="639" rx="62.5" stroke="url(#outline)" stroke-width="16"/>
    <rect x="40.5" y="34.5" width="879" height="609" rx="43.5" stroke="url(#detail)" stroke-width="3"/>
    <path d="M40 140.5h880" stroke="url(#detail)" stroke-width="5"/>
    <path d="M333 35v105" stroke="url(#detail)" stroke-width="4"/>
    <path d="M626 35v105" stroke="url(#detail)" stroke-width="4"/>
    <rect x="69.5" y="67.5" width="181" height="49" rx="6.5" fill="url(#active-tab)" stroke="url(#outline)" stroke-width="4"/>

    <path d="M149 342l54 56-54 55" stroke="url(#prompt)" stroke-width="29"/>
    <path d="M228 454h73" stroke="url(#prompt)" stroke-width="23"/>
  </g>
</svg>
